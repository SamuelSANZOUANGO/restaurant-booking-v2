global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: 'local'

scrape_configs:
  # ── Scrape the booking microservice ────────────────────────────────────────
  - job_name: 'booking-service'
    static_configs:
      - targets: ['booking-service:3000']
    metrics_path: /metrics
    scrape_interval: 10s

  # ── Scrape Prometheus itself ─────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
