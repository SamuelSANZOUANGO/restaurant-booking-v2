apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: restaurant
  labels:
    app: booking-service
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: booking-service
        version: "1.0.0"
      annotations:
        # Tells Prometheus to scrape this pod directly (fallback if ServiceMonitor fails)
        prometheus.io/scrape: "true"
        prometheus.io/path:   "/metrics"
        prometheus.io/port:   "3000"
    spec:
      serviceAccountName: booking-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: booking-service
          image: ghcr.io/samuelsanzou/restaurant-booking-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: DB_PATH
              value: "/app/data/bookings.db"
            - name: ERROR_INJECTION_RATE
              valueFrom:
                configMapKeyRef:
                  name: booking-service-config
                  key: ERROR_INJECTION_RATE
          volumeMounts:
            - name: booking-data
              mountPath: /app/data
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: booking-data
          persistentVolumeClaim:
            claimName: booking-data-pvc
