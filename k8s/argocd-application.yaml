apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: restaurant-booking
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/samuelsanzou/restaurant-booking-service
    targetRevision: main
    path: k8s/               # ArgoCD watches this folder

  destination:
    server: https://kubernetes.default.svc
    namespace: restaurant

  syncPolicy:
    automated:
      prune: true            # delete resources removed from Git
      selfHeal: true         # revert manual changes in cluster
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
