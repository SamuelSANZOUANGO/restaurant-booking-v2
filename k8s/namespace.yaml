---
apiVersion: v1
kind: Namespace
metadata:
  name: restaurant
  labels:
    name: restaurant

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: booking-service
  namespace: restaurant

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: booking-data-pvc
  namespace: restaurant
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard  # adjust to your cluster's StorageClass
